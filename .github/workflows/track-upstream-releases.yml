name: track-upstream-releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  dispatch:
    if: github.repository == 'SDGLBL/codex'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve latest upstream rust tag
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$(scripts/internal/latest_upstream_release.sh openai/codex)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check existing sync state
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$(git ls-remote --heads origin queue/internal queue/base/internal | wc -l | tr -d ' ')" != "2" ]]; then
            echo "queue refs are missing; bootstrap queue/internal and queue/base/internal before enabling automatic release tracking" >&2
            exit 1
          fi

          internal_tag="internal-${UPSTREAM_TAG}"
          candidate_branch="candidate/queue/${UPSTREAM_TAG}"
          tag_exists=false
          pr_exists=false
          other_candidate_pr_exists=false

          if git ls-remote --tags origin "${internal_tag}" | grep -q .; then
            tag_exists=true
          fi

          if [[ "$(gh pr list --base queue/internal --head "${candidate_branch}" --state open --json number --jq 'length')" != "0" ]]; then
            pr_exists=true
          fi

          if [[ "$(gh pr list --base queue/internal --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("candidate/queue/")) | select(.headRefName != "'"${candidate_branch}"'")] | length')" != "0" ]]; then
            other_candidate_pr_exists=true
          fi

          echo "internal_tag=${internal_tag}" >> "$GITHUB_OUTPUT"
          echo "candidate_branch=${candidate_branch}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "pr_exists=${pr_exists}" >> "$GITHUB_OUTPUT"
          echo "other_candidate_pr_exists=${other_candidate_pr_exists}" >> "$GITHUB_OUTPUT"

      - name: Dispatch queue replay workflow
        if: steps.upstream.outputs.tag != '' && steps.state.outputs.tag_exists != 'true' && steps.state.outputs.pr_exists != 'true' && steps.state.outputs.other_candidate_pr_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail
          gh workflow run prepare-queue-pr.yml --ref main -f upstream_tag="${UPSTREAM_TAG}" -f mode=official
